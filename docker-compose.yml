services:
  api:
    build:
      context: ./backend
      target: runtime
    environment:
      DATABASE_PATH: /data/visits.db
      VISITS_PER_TREE: 5
    ports:
      - "8000:8000"
    volumes:
      - tree_nation_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/visits/hourly', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  test:
    build:
      context: ./backend
      target: test
    environment:
      DATABASE_PATH: /tmp/test-visits.db
      VISITS_PER_TREE: 5
    profiles:
      - test

volumes:
  tree_nation_data:
